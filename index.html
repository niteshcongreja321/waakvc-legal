<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nitesh Kumar</title>
  <meta name="description" content="Legal and support pages for Waak VC and other apps by Nitesh Kumar.">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0f14;
      --card: #151b24;
      --text: #e8edf5;
      --muted: #8b97a8;
      --accent: #2f81f7;
      --border: #243041;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      width: min(520px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
    }
    h1 { margin: 0 0 8px; font-size: 1.75rem; }
    p { color: var(--muted); margin: 0 0 24px; }
    a {
      display: block;
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 12px;
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    a:hover {
      border-color: var(--accent);
      background: rgba(47, 129, 247, 0.08);
    }
    a strong { color: var(--accent); display: block; margin-bottom: 2px; }
  </style>
</head>
<body>
  <main>
    <h1>Nitesh Kumar</h1>
    <p>Legal and support pages for Waak VC and other mobile applications.</p>
    <a href="privacy-policy/"><strong>Privacy Policy</strong>How we handle your data</a>
    <a href="terms/"><strong>Terms of Service</strong>Rules for using our apps</a>
    <a href="mailto:niteshcongreja321@gmail.com"><strong>Contact</strong>niteshcongreja321@gmail.com</a>
  </main>
</body>
</html>
